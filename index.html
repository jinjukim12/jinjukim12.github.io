<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Portfolio</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            margin: 0;
            background-color: #ffffff;
            font-family: sans-serif;
            line-height: 1.6;
        }
        .container {
            text-align: center;
            max-width: 900px;
            width: 90%;
        }
        .profile-img {
            width: 250px;
            height: auto;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .promise-text {
            font-size: 1.2rem;
            color: #000000;
            font-weight: 500;
            margin-bottom: 20px;
        }
        /* PPT 다운로드 버튼 스타일 */
        .download-btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin: 10px 0 30px 0;
            transition: background-color 0.2s;
        }
        .download-btn:hover {
            background-color: #0056b3;
        }
        hr {
            width: 100%;
            border: 0;
            border-top: 1px solid #eeeeee;
            margin: 50px 0;
        }
        .grid-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }
        .description-box {
            text-align: left;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #333;
            margin-top: -10px;
            margin-bottom: 20px;
            border-left: 4px solid #ddd;
        }
        .full-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }
        img {
            width: 100%;
            height: auto;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .large-img {
            max-width: 100%;
        }
        @media (max-width: 700px) {
            .grid-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="profile.jpg" alt="Profile" class="profile-img">
    <p class="promise-text">"I keep the promise between Prof. and I"</p>

    <a href="LLM_homework.pptx" download class="download-btn">
        📄 실습 과제 PPT 다운로드 받기
    </a>

    <hr>

    <div class="grid-section">
        <img src="topk_experiment.png" alt="Top-K">
        <img src="topp_experiment.png" alt="Top-P">
        <img src="cot_experiment.png" alt="CoT">
        <img src="temperature_experiment.png" alt="Temperature">
    </div>
    
    <div class="description-box">
        • <b>Temperature:</b> 값이 낮을수록 더 안정적이고 예측 가능한 문장이 생성되며, 높을수록 다양하고 창의적인 표현이 증가한다.<br>
        • <b>Top-k:</b> 고려하는 후보 단어의 개수를 제한하는 방식으로, 값이 작을수록 보수적인 출력이 나오고 클수록 다양한 표현이 가능해진다.<br>
        • <b>Top-p:</b> 누적 확률을 기준으로 후보를 선택하여, 값이 낮으면 일관성이 높고 값이 높으면 더 다양한 텍스트가 생성된다.
    </div>

    <hr>

    <div class="grid-section">
        <img src="MOP.png" alt="MOP">
        <img src="NLP_prompt.png" alt="NLP Prompt">
        <img src="NLP_result.png" alt="NLP Result">
        <img src="nlpgrpah.png" alt="Graph">
    </div>

    <hr>

    <div class="full-section">
        <img src="gemini_api_key.jpg" alt="API Key" class="large-img">
        <img src="result.jpg" alt="Result" class="large-img">
    </div>
</div>

</body>
</html>
