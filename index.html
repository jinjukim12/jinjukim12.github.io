<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        .content {
            text-align: center;
        }
        .profile-img {
            width: 250px; /* 사진 크기 조절 가능 */
            height: auto;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        .promise-text {
            font-size: 1.2rem;
            color: #000000;
            font-weight: 500;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="content">
    <img src="profile.jpg" alt="Profile Image" class="profile-img">
    
    <p class="promise-text">
        "I keep the promise between Prof. and I"
    </p>
</div>

</body>
</html>
