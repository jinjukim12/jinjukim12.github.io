
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Research Homepage</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            margin: 0;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            max-width: 800px;
            width: 90%;
        }
        .profile-img {
            width: 250px;
            height: auto;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .promise-text {
            font-size: 1.2rem;
            color: #000000;
            font-weight: 500;
            margin-bottom: 50px;
        }
        .research-section {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2열로 배치 */
            gap: 20px;
            margin-top: 30px;
        }
        .research-img {
            width: 100%;
            height: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        @media (max-width: 600px) {
            .research-section {
                grid-template-columns: 1fr; /* 모바일에서는 1열로 */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="profile.jpg" alt="Profile" class="profile-img">
    <p class="promise-text">"I keep the promise between Prof. and I"</p>

    <hr style="width: 100%; border: 0.5px solid #eee; margin-bottom: 40px;">

    <div class="research-section">
        <img src="MOP.png" alt="Optimization 1" class="research-img">
        <img src="NLP_prompt.png" alt="Optimization 2" class="research-img">
        <img src="NLP_result.png" alt="Optimization 3" class="research-img">
        <img src="nlpgrpah.png" alt="Optimization 4" class="research-img">
    </div>
</div>

</body>
</html>
