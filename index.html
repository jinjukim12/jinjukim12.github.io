<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Portfolio</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 0;
            margin: 0;
            background-color: #ffffff;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            max-width: 800px;
            width: 90%;
        }
        .profile-img {
            width: 250px;
            height: auto;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .promise-text {
            font-size: 1.2rem;
            color: #000000;
            font-weight: 500;
            margin-bottom: 20px;
        }
        hr {
            width: 100%;
            border: 0;
            border-top: 1px solid #eeeeee;
            margin: 40px 0;
        }
        .section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .full-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        img {
            width: 100%;
            height: auto;
            border: 1px solid #f0f0f0;
            border-radius: 5px;
        }
        .large-img {
            max-width: 100%;
        }
        @media (max-width: 600px) {
            .section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="profile.jpg" alt="Profile" class="profile-img">
    <p class="promise-text">"I keep the promise between Prof. and I"</p>

    <hr>

    <div class="section">
        <img src="MOP.png" alt="MOP">
        <img src="NLP_prompt.png" alt="NLP Prompt">
        <img src="NLP_result.png" alt="NLP Result">
        <img src="nlpgrpah.png" alt="Graph">
    </div>

    <hr>

    <div class="full-section">
        <img src="gemini_api_key.jpg" alt="API Key" class="large-img">
        <img src="result.png" alt="Result" class="large-img">
    </div>
</div>

</body>
</html>
